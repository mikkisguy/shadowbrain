services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shadowbrain-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATA_DIR=/app/data
      - MIGRATIONS_DIR=/app/src/db/migrations
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_JOURNAL_CHANNEL_ID=${DISCORD_JOURNAL_CHANNEL_ID}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_MODEL=${AI_MODEL:-mistralai/mistral-7b-instruct}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-86400000}

      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    env_file:
      - .env
    labels:
      - com.centurylinklabs.watchtower.enable=true
    volumes:
      - shadowbrain_data:/app/data

volumes:
  shadowbrain_data:
