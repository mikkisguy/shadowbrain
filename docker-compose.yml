services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shadowbrain-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATA_DIR=/app/data
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_JOURNAL_CHANNEL_ID=${DISCORD_JOURNAL_CHANNEL_ID}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_MODEL=${AI_MODEL:-mistralai/mistral-7b-instruct}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - SESSION_SECRET=${SESSION_SECRET}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - shadowbrain-network

  nginx:
    image: nginx:alpine
    container_name: shadowbrain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/app/data:ro
    depends_on:
      - app
    networks:
      - shadowbrain-network

networks:
  shadowbrain-network:
    driver: bridge

volumes:
  data:
