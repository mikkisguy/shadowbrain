name: Lint, Typecheck & Test

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    container: node:24-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Enable pnpm via corepack
        run: |
          corepack enable pnpm
          corepack prepare pnpm@11 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sqlite-vec extension
        # Required by tests that exercise vector search (the vec0 loadable
        # extension is not pre-built on node:24-alpine). Builds from source
        # via scripts/build-sqlite-vec.sh.
        run: |
          apk add --no-cache gcc musl-dev curl gettext make
          ./scripts/build-sqlite-vec.sh

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        # Catches Next.js / production issues that lint + typecheck + test
        # miss: route handler type validation, server/client boundary
        # errors, RSC generation, static-page collection, etc.
        run: pnpm build

      - name: Test
        run: pnpm test --run
